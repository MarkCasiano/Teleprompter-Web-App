<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gemini Prompter Cam</title>
    <style>
        :root { --bg: #000; --panel: #1a1a1a; --accent: #007bff; --danger: #dc3545; --success: #28a745; }
        body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--bg); color: white; overflow: hidden; height: 100vh; }
        
        #app { display: flex; flex-direction: column; height: 100vh; }

        /* Teleprompter Section */
        #prompter-container {
            flex: 1.2;
            overflow: hidden;
            position: relative;
            background: #0a0a0a;
            border-bottom: 2px solid #333;
            display: flex;
            justify-content: center;
        }

        #focus-zone {
            position: absolute;
            top: 50%;
            left: 0;
            width: 100%;
            height: 60px;
            background: rgba(255, 255, 0, 0.1);
            border-top: 1px solid rgba(255, 255, 0, 0.3);
            border-bottom: 1px solid rgba(255, 255, 0, 0.3);
            transform: translateY(-50%);
            pointer-events: none;
            z-index: 10;
        }

        #script-display {
            padding: 40px 20px;
            font-size: 32px;
            line-height: 1.5;
            text-align: center;
            position: absolute;
            width: 90%;
            z-index: 5;
            transition: transform 0.1s linear;
            white-space: pre-wrap;
        }

        /* Video Preview */
        #video-container { flex: 0.8; background: #000; position: relative; }
        video { width: 100%; height: 100%; object-fit: cover; }

        /* Controls */
        .controls {
            padding: 12px;
            background: var(--panel);
            display: flex;
            flex-direction: column;
            gap: 10px;
            z-index: 20;
        }

        textarea { height: 50px; background: #222; color: #fff; border: 1px solid #444; border-radius: 4px; padding: 8px; font-size: 14px; }
        
        .btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        button { padding: 12px; border-radius: 6px; border: none; font-weight: bold; color: white; cursor: pointer; font-size: 14px; transition: opacity 0.2s; }
        button:disabled { opacity: 0.5; cursor: not-allowed; }

        #start-btn { background: var(--success); grid-column: span 2; font-size: 16px; }
        #stop-btn { background: var(--danger); grid-column: span 2; font-size: 16px; display: none; }
        .util-btn { background: #444; }

        .sliders { display: flex; gap: 15px; align-items: center; }
        .slider-item { flex: 1; display: flex; flex-direction: column; font-size: 11px; color: #999; }
        input[type=range] { margin-top: 5px; }

        /* Overlays */
        #countdown-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); display: none; justify-content: center;
            align-items: center; z-index: 1000; font-size: 150px; font-weight: bold; color: #ffcc00;
        }
    </style>
</head>
<body>

<div id="app">
    <div id="prompter-container">
        <div id="focus-zone"></div>
        <div id="script-display">Ready to record...</div>
    </div>

    <div id="video-container">
        <video id="preview" autoplay muted playsinline></video>
    </div>

    <div class="controls">
        <textarea id="script-input" placeholder="Paste your script here..."></textarea>
        
        <div class="sliders">
            <div class="slider-item">
                <label>Speed</label>
                <input type="range" id="speed-control" min="1" max="15" value="4">
            </div>
            <div class="slider-item">
                <label>Font Size</label>
                <input type="range" id="font-control" min="16" max="80" value="32">
            </div>
        </div>

        <div class="btn-grid">
            <button id="start-btn">🔴 Start Recording</button>
            <button id="stop-btn">⬜ Stop & Save</button>
            <button id="mirror-btn" class="util-btn">Mirror: OFF</button>
            <button id="load-btn" class="util-btn">📂 Load .txt</button>
            <button id="save-btn" class="util-btn">💾 Save Script</button>
        </div>
        <input type="file" id="file-input" style="display:none" accept=".txt">
    </div>
</div>

<div id="countdown-overlay"><div id="cd-num">3</div></div>

<script>
    let mediaRecorder;
    let recordedChunks = [];
    let isMirrored = false;
    let scrollPos = 150;

    const scriptDisplay = document.getElementById('script-display');
    const scriptInput = document.getElementById('script-input');
    const speedCtrl = document.getElementById('speed-control');
    const fontCtrl = document.getElementById('font-control');
    const startBtn = document.getElementById('start-btn');
    const stopBtn = document.getElementById('stop-btn');
    const cdOverlay = document.getElementById('countdown-overlay');
    const cdNum = document.getElementById('cd-num');

    // Sync Font Size
    fontCtrl.oninput = () => {
        scriptDisplay.style.fontSize = fontCtrl.value + 'px';
        document.getElementById('focus-zone').style.height = (fontCtrl.value * 1.6) + 'px';
    };

    // Mirror Mode
    document.getElementById('mirror-btn').onclick = (e) => {
        isMirrored = !isMirrored;
        e.target.innerText = isMirrored ? "Mirror: ON" : "Mirror: OFF";
        scriptDisplay.style.transform = `scaleX(${isMirrored ? -1 : 1})`;
    };

    // File Management
    document.getElementById('save-btn').onclick = () => {
        const blob = new Blob([scriptInput.value], {type: 'text/plain'});
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url; a.download = 'script.txt'; a.click();
    };

    document.getElementById('load-btn').onclick = () => document.getElementById('file-input').click();
    document.getElementById('file-input').onchange = (e) => {
        const reader = new FileReader();
        reader.onload = (ev) => { scriptInput.value = ev.target.result; };
        reader.readAsText(e.target.files[0]);
    };

    // Recording Logic
    startBtn.onclick = async () => {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" }, audio: true });
            document.getElementById('preview').srcObject = stream;
            scriptDisplay.innerText = scriptInput.value || "No script entered...";
            
            // Countdown
            let count = 3;
            cdOverlay.style.display = 'flex';
            cdNum.innerText = count;
            
            const timer = setInterval(() => {
                count--;
                if(count > 0) cdNum.innerText = count;
                else {
                    clearInterval(timer);
                    cdOverlay.style.display = 'none';
                    beginCapture(stream);
                }
            }, 1000);
        } catch (err) { alert("Camera error: " + err); }
    };

    function beginCapture(stream) {
        recordedChunks = [];
        mediaRecorder = new MediaRecorder(stream);
        mediaRecorder.ondataavailable = e => recordedChunks.push(e.data);
        mediaRecorder.onstop = exportVideo;
        mediaRecorder.start();

        startBtn.style.display = 'none';
        stopBtn.style.display = 'block';

        scrollPos = 150;
        const animate = () => {
            if(mediaRecorder.state === "recording") {
                scrollPos -= parseFloat(speedCtrl.value) / 4;
                const mScale = isMirrored ? -1 : 1;
                scriptDisplay.style.transform = `translateY(${scrollPos}px) scaleX(${mScale})`;
                requestAnimationFrame(animate);
            }
        };
        animate();
    }

    stopBtn.onclick = () => {
        mediaRecorder.stop();
        mediaRecorder.stream.getTracks().forEach(track => track.stop());
        startBtn.style.display = 'block';
        stopBtn.style.display = 'none';
    };

    function exportVideo() {
        const blob = new Blob(recordedChunks, { type: 'video/webm' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url; a.download = `recording-${Date.now()}.webm`;
        a.click();
    }
</script>
</body>
</html>
