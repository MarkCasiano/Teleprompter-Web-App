<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PrompterCam Pro</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🎥</text></svg>">
    
    <style>
        :root { --bg: #000; --panel: #1a1a1a; --accent: #007bff; --danger: #dc3545; --success: #28a745; --warning: #ffc107; }
        * { box-sizing: border-box; touch-action: manipulation; }
        body { margin: 0; font-family: sans-serif; background: var(--bg); color: white; height: 100vh; width: 100vw; overflow: hidden; }

        #app { display: grid; grid-template-rows: 1fr 1fr auto; height: 100vh; }

        @media (orientation: landscape) {
            #app { grid-template-rows: 1fr auto; grid-template-columns: 1fr 1fr; }
            .controls { grid-column: span 2; }
        }

        /* Prompter Area - Now Scrollable */
        #prompter-container {
            position: relative; background: #050505; 
            overflow-y: auto; /* Enable native scrolling */
            overflow-x: hidden;
            display: block; /* Changed from flex to allow scrolling */
            border-bottom: 1px solid #333;
            -webkit-overflow-scrolling: touch;
        }

        #focus-zone {
            position: sticky; /* Stays in the middle while content moves */
            top: 50%; left: 0; width: 100%; height: 60px;
            background: rgba(255, 255, 0, 0.1); border-top: 1px solid rgba(255, 255, 0, 0.3);
            border-bottom: 1px solid rgba(255, 255, 0, 0.3); transform: translateY(-50%);
            z-index: 10; pointer-events: none;
        }

        #script-display {
            padding: 50vh 20px; /* Buffer to allow first/last lines to hit the focus zone */
            width: 100%; text-align: center; font-size: 32px; font-weight: bold;
            line-height: 1.5; z-index: 5; white-space: pre-wrap; 
            transition: none; /* Removed CSS transform for native scroll */
        }

        #video-container { background: #000; overflow: hidden; border-bottom: 1px solid #333; }
        video { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }

        .controls { background: var(--panel); padding: 10px; display: flex; flex-direction: column; gap: 8px; }
        textarea { width: 100%; height: 40px; background: #222; color: #fff; border: 1px solid #444; border-radius: 4px; padding: 5px; font-size: 14px; }

        .sliders { display: flex; gap: 10px; }
        .slider-item { flex: 1; display: flex; flex-direction: column; font-size: 10px; color: #888; }

        .btn-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 5px; }
        button { padding: 10px 2px; border-radius: 4px; border: none; font-weight: bold; color: white; cursor: pointer; font-size: 11px; }

        #start-btn { background: var(--success); grid-column: span 3; font-size: 16px; }
        #stop-btn { background: var(--danger); grid-column: span 2; font-size: 16px; display: none; }
        #restart-btn { background: var(--warning); color: black; display: none; font-size: 16px; }
        .util-btn { background: #444; }

        #countdown-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.85);
            display: none; justify-content: center; align-items: center; z-index: 1000;
        }
        #cd-num { font-size: 120px; color: #ffcc00; font-weight: bold; }
    </style>
</head>
<body>

<div id="app">
    <div id="prompter-container" id="scroll-area">
        <div id="focus-zone"></div>
        <div id="script-display">Script goes here...</div>
    </div>

    <div id="video-container">
        <video id="preview" autoplay muted playsinline></video>
    </div>

    <div class="controls">
        <textarea id="script-input" placeholder="Enter script here..."></textarea>
        
        <div class="sliders">
            <div class="slider-item"><label>Speed</label><input type="range" id="speed-control" min="1" max="20" value="5"></div>
            <div class="slider-item"><label>Size</label><input type="range" id="font-control" min="16" max="100" value="32"></div>
            <div class="slider-item"><label>Color</label><input type="color" id="color-control" value="#ffff00"></div>
        </div>

        <div class="btn-grid">
            <button id="start-btn">🔴 START RECORDING</button>
            <button id="stop-btn">⬜ STOP & SAVE</button>
            <button id="restart-btn">🔄 RESTART</button>
            <button id="mirror-btn" class="util-btn">MIRROR TEXT</button>
            <button id="load-btn" class="util-btn">LOAD TXT</button>
            <button id="save-btn" class="util-btn">SAVE TXT</button>
        </div>
        <input type="file" id="file-input" style="display:none" accept=".txt">
    </div>
</div>

<div id="countdown-overlay"><div id="cd-num">3</div></div>

<script>
    let mediaRecorder, recordedChunks = [], isMirrored = false, animFrame, activeStream;
    let isAutoScrolling = false;

    const container = document.getElementById('prompter-container');
    const scriptDisplay = document.getElementById('script-display');
    const scriptInput = document.getElementById('script-input');
    const speedCtrl = document.getElementById('speed-control');
    const fontCtrl = document.getElementById('font-control');
    const startBtn = document.getElementById('start-btn');
    const stopBtn = document.getElementById('stop-btn');
    const restartBtn = document.getElementById('restart-btn');

    // Sync Text instantly
    scriptInput.oninput = () => { scriptDisplay.innerText = scriptInput.value; };

    fontCtrl.oninput = () => {
        scriptDisplay.style.fontSize = fontCtrl.value + 'px';
        document.getElementById('focus-zone').style.height = (fontCtrl.value * 1.6) + 'px';
    };

    document.getElementById('color-control').oninput = (e) => {
        const zone = document.getElementById('focus-zone');
        zone.style.background = e.target.value + "26";
        zone.style.borderColor = e.target.value + "80";
    };

    document.getElementById('mirror-btn').onclick = () => {
        isMirrored = !isMirrored;
        scriptDisplay.style.transform = isMirrored ? 'scaleX(-1)' : 'scaleX(1)';
    };

    // File Management
    document.getElementById('save-btn').onclick = () => {
        const a = document.createElement('a');
        a.href = URL.createObjectURL(new Blob([scriptInput.value], {type: 'text/plain'}));
        a.download = 'script.txt'; a.click();
    };

    document.getElementById('load-btn').onclick = () => document.getElementById('file-input').click();
    document.getElementById('file-input').onchange = (e) => {
        const reader = new FileReader();
        reader.onload = (ev) => { scriptInput.value = ev.target.result; scriptDisplay.innerText = ev.target.result; };
        reader.readAsText(e.target.files[0]);
    };

    // Recording Logic
    startBtn.onclick = async () => {
        try {
            activeStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" }, audio: true });
            document.getElementById('preview').srcObject = activeStream;
            runCountdown();
        } catch (err) { alert("Camera access required."); }
    };

    function runCountdown() {
        scriptDisplay.innerText = scriptInput.value || "No script loaded...";
        
        let count = 3;
        const overlay = document.getElementById('countdown-overlay');
        const num = document.getElementById('cd-num');
        overlay.style.display = 'flex';
        num.innerText = count;

        const timer = setInterval(() => {
            count--;
            if(count > 0) num.innerText = count;
            else {
                clearInterval(timer);
                overlay.style.display = 'none';
                beginCapture();
            }
        }, 1000);
    }

    function beginCapture() {
        recordedChunks = [];
        mediaRecorder = new MediaRecorder(activeStream);
        mediaRecorder.ondataavailable = e => recordedChunks.push(e.data);
        mediaRecorder.onstop = exportVideo;
        mediaRecorder.start();

        startBtn.style.display = 'none';
        stopBtn.style.display = 'block';
        restartBtn.style.display = 'block';

        isAutoScrolling = true;
        const scrollLoop = () => {
            if (isAutoScrolling && mediaRecorder && mediaRecorder.state === "recording") {
                container.scrollTop += parseFloat(speedCtrl.value) / 10;
                animFrame = requestAnimationFrame(scrollLoop);
            }
        };
        scrollLoop();
    }

    // Pause auto-scroll on touch, resume after short delay
    container.addEventListener('touchstart', () => { isAutoScrolling = false; });
    container.addEventListener('touchend', () => { 
        setTimeout(() => { if(mediaRecorder && mediaRecorder.state === "recording") isAutoScrolling = true; }, 1000);
    });

    stopBtn.onclick = () => {
        isAutoScrolling = false;
        if(mediaRecorder) mediaRecorder.stop();
        if(activeStream) activeStream.getTracks().forEach(t => t.stop());
        cancelAnimationFrame(animFrame);
        startBtn.style.display = 'block';
        stopBtn.style.display = 'none';
        restartBtn.style.display = 'none';
    };

    restartBtn.onclick = () => {
        isAutoScrolling = false;
        if(mediaRecorder) mediaRecorder.stop();
        runCountdown();
    };

    function exportVideo() {
        if (recordedChunks.length === 0) return;
        const a = document.createElement('a');
        a.href = URL.createObjectURL(new Blob(recordedChunks, { type: 'video/webm' })); 
        a.download = `PrompterTake-${Date.now()}.webm`;
        a.click();
    }
</script>
</body>
</html>
